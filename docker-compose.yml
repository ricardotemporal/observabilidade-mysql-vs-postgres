services:
  mysql:
    image: mysql:8.4
    container_name: bench_mysql
    environment:
      MYSQL_ROOT_PASSWORD: benchpass
      MYSQL_DATABASE: sbtest
      MYSQL_USER: sbuser
      MYSQL_PASSWORD: sbpass
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - mysql_data:/var/lib/mysql
    cpus: 2.0
    mem_limit: 4g
    memswap_limit: 4g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbenchpass"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - benchnet

  postgres:
    image: postgres:17
    container_name: bench_postgres
    environment:
      POSTGRES_PASSWORD: benchpass
      POSTGRES_USER: sbuser
      POSTGRES_DB: sbtest
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    cpus: 2.0
    mem_limit: 4g
    memswap_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbuser -d sbtest"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - benchnet

  mysql_exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: bench_mysql_exporter
    command:
      - "--mysqld.username=root:benchpass"
      - "--mysqld.address=mysql:3306"
      - "--collect.info_schema.processlist"
      - "--collect.info_schema.innodb_metrics"
      - "--collect.info_schema.tablestats"
      - "--collect.perf_schema.eventsstatements"
      - "--collect.perf_schema.eventswaits"
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - benchnet

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: bench_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://sbuser:benchpass@postgres:5432/sbtest?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - benchnet

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: bench_node_exporter
    ports:
      - "9100:9100"
    networks:
      - benchnet

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bench_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - benchnet

  grafana:
    image: grafana/grafana:11.2.0
    container_name: bench_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - benchnet

networks:
  benchnet:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  prometheus_data:
  grafana_data:
